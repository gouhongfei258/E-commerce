syntax = "proto3";

package user.v1;

option go_package = "github.com/storm/myidea/api/user/v1;v1";

// UserService handles user registration, login, and address management.
service UserService {
  // Register creates a new user account.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Login authenticates a user and returns user info.
  rpc Login(LoginRequest) returns (LoginResponse);

  // GetUser returns a user by ID.
  rpc GetUser(GetUserRequest) returns (UserProto);

  // CreateAddress adds a new shipping address.
  rpc CreateAddress(CreateAddressRequest) returns (AddressProto);

  // UpdateAddress modifies an existing address (scoped to user).
  rpc UpdateAddress(UpdateAddressRequest) returns (AddressProto);

  // DeleteAddress removes an address (scoped to user).
  rpc DeleteAddress(DeleteAddressRequest) returns (Empty);

  // ListAddresses returns all addresses for a user.
  rpc ListAddresses(ListAddressesRequest) returns (ListAddressesResponse);

  // SetDefaultAddress marks an address as the default (scoped to user).
  rpc SetDefaultAddress(SetDefaultAddressRequest) returns (AddressProto);

  // AdminListUsers lists all users with pagination and keyword search (admin only).
  rpc AdminListUsers(AdminListUsersRequest) returns (AdminListUsersResponse);
}

// ------------------ Shared messages ------------------

message Empty {}

message UserProto {
  int64  id         = 1;
  string username   = 2;
  string phone      = 3;
  string email      = 4;
  string role       = 5; // "user" or "admin"
  string created_at = 6;
  string updated_at = 7;
}

message AddressProto {
  int64  id             = 1;
  int64  user_id        = 2;
  string receiver_name  = 3;
  string receiver_phone = 4;
  string province       = 5;
  string city           = 6;
  string district       = 7;
  string detail_address = 8;
  bool   is_default     = 9;
  string created_at     = 10;
}

// ------------------ Register ------------------

message RegisterRequest {
  string username = 1;
  string password = 2;
  string phone    = 3;
  string email    = 4;
  string role     = 5; // default "user"
}

message RegisterResponse {
  UserProto user = 1;
}

// ------------------ Login ------------------

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  UserProto user = 1;
}

// ------------------ GetUser ------------------

message GetUserRequest {
  int64 id = 1;
}

// ------------------ CreateAddress ------------------

message CreateAddressRequest {
  int64  user_id        = 1;
  string receiver_name  = 2;
  string receiver_phone = 3;
  string province       = 4;
  string city           = 5;
  string district       = 6;
  string detail_address = 7;
  bool   is_default     = 8;
}

// ------------------ UpdateAddress ------------------

message UpdateAddressRequest {
  int64  id             = 1;
  int64  user_id        = 2;
  string receiver_name  = 3;
  string receiver_phone = 4;
  string province       = 5;
  string city           = 6;
  string district       = 7;
  string detail_address = 8;
  bool   is_default     = 9;
}

// ------------------ DeleteAddress ------------------

message DeleteAddressRequest {
  int64 id      = 1;
  int64 user_id = 2;
}

// ------------------ ListAddresses ------------------

message ListAddressesRequest {
  int64 user_id = 1;
}

message ListAddressesResponse {
  repeated AddressProto addresses = 1;
}

// ------------------ AdminListUsers ------------------

message AdminListUsersRequest {
  int32  page      = 1;
  int32  page_size = 2;
  string keyword   = 3;
}

message AdminListUsersResponse {
  repeated UserProto users = 1;
  int32               total = 2;
}

// ------------------ SetDefaultAddress ------------------

message SetDefaultAddressRequest {
  int64 id      = 1;
  int64 user_id = 2;
}
