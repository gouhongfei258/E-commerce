syntax = "proto3";

package order.v1;

option go_package = "github.com/storm/myidea/api/order/v1;v1";

// OrderService is the core order management service.
service OrderService {
  // CreateOrder creates a new order from the user's cart selection.
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);

  // GetOrder returns a single order by ID (scoped to user).
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);

  // ListOrders returns a paginated list of orders for a user.
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);

  // UpdateOrderStatus advances the order to the next allowed status.
  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (UpdateOrderStatusResponse);

  // CancelOrder cancels an order if it is still in pending status.
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);

  // AdminListOrders lists all orders with filters (admin only).
  rpc AdminListOrders(AdminListOrdersRequest) returns (AdminListOrdersResponse);
}

// OrderErrorReason defines business error codes for the order domain.
enum OrderErrorReason {
  ORDER_NOT_FOUND        = 0;
  ORDER_STATUS_INVALID   = 1;
  ORDER_CANNOT_CANCEL    = 2;
  ORDER_CREATE_FAILED    = 3;
  ORDER_ITEM_EMPTY       = 4;
  ORDER_ADDRESS_REQUIRED = 5;
  ORDER_UNAUTHORIZED     = 6;
}

// ------------------ Shared messages ------------------

message OrderItemProto {
  int64  sku_id       = 1;
  int64  product_id   = 2;
  string product_name = 3;
  string image        = 4;
  double price        = 5;
  int32  quantity     = 6;
}

message ShippingAddressProto {
  string receiver_name  = 1;
  string receiver_phone = 2;
  string province       = 3;
  string city           = 4;
  string district       = 5;
  string detail_address = 6;
}

message OrderProto {
  int64                id             = 1;
  int64                user_id        = 2;
  string               order_no       = 3;
  int32                status         = 4;
  double               total_amount   = 5;
  double               paid_amount    = 6;
  string               payment_method = 7;
  ShippingAddressProto address        = 8;
  repeated OrderItemProto items       = 9;
  string               remark         = 10;
  string               created_at     = 11;
  string               updated_at     = 12;
}

// ------------------ CreateOrder ------------------

message CreateOrderRequest {
  int64                      user_id = 1;
  repeated OrderItemProto    items   = 2;
  ShippingAddressProto       address = 3;
  string                     remark  = 4;
}

message CreateOrderResponse {
  OrderProto order = 1;
}

// ------------------ GetOrder ------------------

message GetOrderRequest {
  int64 id      = 1;
  int64 user_id = 2;
}

message GetOrderResponse {
  OrderProto order = 1;
}

// ------------------ ListOrders ------------------

message ListOrdersRequest {
  int64 user_id   = 1;
  int32 status    = 2; // 0 = all
  int32 page      = 3;
  int32 page_size = 4;
}

message ListOrdersResponse {
  repeated OrderProto orders = 1;
  int32               total  = 2;
}

// ------------------ UpdateOrderStatus ------------------

message UpdateOrderStatusRequest {
  int64 id     = 1;
  int32 status = 2;
}

message UpdateOrderStatusResponse {}

// ------------------ AdminListOrders ------------------

message AdminListOrdersRequest {
  int32  page      = 1;
  int32  page_size = 2;
  int32  status    = 3; // 0 = all
  string keyword   = 4; // order_no or receiver_name
  string date_from = 5; // "2025-01-01"
  string date_to   = 6;
}

message AdminListOrdersResponse {
  repeated OrderProto orders = 1;
  int32               total  = 2;
}

// ------------------ CancelOrder ------------------

message CancelOrderRequest {
  int64 id      = 1;
  int64 user_id = 2;
}

message CancelOrderResponse {}
